# =============================================================================
# 90DNS conntest server — Nintendo Switch 连通性测试模拟
# =============================================================================
# 用途：让 Switch 在 CFW 模式下 conntest 通过，但实际访问任天堂任何服务都失败
# 部署：放到 /etc/nginx/conf.d/90dns.conf 或 /etc/nginx/sites-available/ 启用
# 依赖：nginx 监听 80 端口（必须，Switch conntest 走 HTTP，不能用 HTTPS）
# DNS：还需要把以下域名解析指向运行此 nginx 的 IP
#   - conntest.nintendowifi.net
#   - ctest.cdn.nintendo.net
# 注：ctest.cdn.n.nintendoswitch.cn 仅国行 Switch 使用，未保留
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name conntest.nintendowifi.net
                ctest.cdn.nintendo.net;

    # 访问日志可选；建议保留一段时间确认 Switch 能命中
    access_log  /var/log/nginx/90dns.access.log;
    error_log   /var/log/nginx/90dns.error.log;

    # 关闭 nginx 版本号曝光
    server_tokens off;

    # Switch conntest 唯一的硬性校验：
    #   1. HTTP 200 OK
    #   2. 响应头包含 X-Organization: Nintendo
    #   3. body 长度任意（空 body 即可）
    location / {
        add_header X-Organization "Nintendo" always;
        default_type text/html;
        return 200 "";
    }
}